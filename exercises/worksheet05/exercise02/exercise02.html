    <!-- script 3 -->
    <script id="vertex-shader-3" type="x-shader/x-vertex">
      attribute vec3 a_var_Pos;
      attribute vec3 a_var_Nml; // unused
      attribute vec4 a_var_Colour;

      uniform mat4 modelView;
      uniform mat4 pspMtrx;

      varying vec4 fVarColour;

      void main() {
          fVarColour = a_var_Colour;

          vec4 cmraVarPosition = modelView * vec4(a_var_Pos, 1);
          gl_Position = pspMtrx * cmraVarPosition;
      }
  </script>
  <script id="fragment-shader-3" type="x-shader/x-fragment">
      precision highp float;

      varying vec4 fVarColour;

      void main() {
          gl_FragColor = fVarColour;
      }
  </script>
