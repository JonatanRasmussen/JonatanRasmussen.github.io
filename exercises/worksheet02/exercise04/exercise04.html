<!DOCTYPE html>

<script id="vertex-shader" type="x-shader/x-vertex">
  attribute vec2 myPos;
  attribute vec3 myColor;
  varying vec4 color;

  void main(){
    gl_PointSize = 12.0;
    gl_Position = vec4(myPos, 0.0, 1.0);
    color = vec4(myColor, 1.0);
  }
</script>
<script id="fragment-shader" type="x-shader/x-fragment">
  precision mediump float;
  varying vec4 color;

  void main(){
    gl_FragColor = color;
  }
</script>
